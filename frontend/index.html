<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShopX - Amazon Style Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 TOP NAVBAR -->
<header class="navbar">
  <div class="logo">ShopX</div>

  <input type="text" id="search" placeholder="Search products...">

  <div class="nav-right">
    <span onclick="showCart()">🛒 Cart (<span id="cartCount">0</span>)</span>
  </div>
</header>

<!-- 🔥 HERO BANNER -->
<section class="hero">
  <h1>Big Deals, Big Savings</h1>
  <p>Shop the best products like Amazon</p>
</section>

<!-- 🔥 PRODUCT SECTION -->
<section class="products-section">
  <h2>🔥 Trending Products</h2>
  <div id="products" class="products-grid"></div>
</section>

<!-- 🔥 CART PANEL -->
<div id="cartPanel" class="cart-panel hidden">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <button onclick="checkout()">Checkout</button>
</div>
<h1>TEST CHANGE</h1>
<script src="app.js"></script>
</body>
</html>
